<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Assist Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e4e4e7;
      --muted:     #71717a;
      --accent:    #6366f1;
      --accent-lo: #6366f120;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --radius:    12px;
    }
    html, body {
      height: 100vh;
      overflow: hidden;
    }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header .subtitle { color: var(--muted); font-size: .75rem; }
    .header-right { display: flex; align-items: center; gap: .75rem; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .25rem .65rem;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
      background: #22c55e18;
      color: var(--green);
    }
    .status-badge.disconnected { background: #ef444418; color: var(--red); }
    .status-badge.connecting   { background: #f59e0b18; color: var(--amber); }
    .status-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
    }

    /* ── Settings toggle ───────────────────────────────── */
    .settings-toggle {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .4rem .7rem;
      color: var(--muted);
      font-size: .78rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .settings-toggle:hover { border-color: var(--accent); color: var(--text); }

    /* ── Settings drawer ──────────────────────────────── */
    .settings-drawer {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings-drawer.open { display: flex; }
    .settings-drawer .field {
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .settings-drawer label {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .settings-drawer select, .settings-drawer input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .35rem .55rem;
      color: var(--text);
      font-size: .78rem;
      outline: none;
    }
    .settings-drawer select:focus { border-color: var(--accent); }

    .btn {
      padding: .4rem .9rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: .78rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: .9; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Main layout: Compliance | Chat ────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Compliance panel (left) ──────────────────────── */
    .compliance-panel {
      width: 380px;
      min-width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .compliance-header {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .compliance-header-left {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .compliance-header h2 { font-size: .85rem; font-weight: 600; }
    .compliance-header .icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      background: #ef444420; color: var(--red);
    }
    .alert-counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 .4rem;
      border-radius: 11px;
      font-size: .68rem;
      font-weight: 700;
      background: var(--bg);
      color: var(--muted);
    }
    .alert-counter.has-alerts {
      background: var(--red);
      color: #fff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .7; }
    }

    .compliance-alerts {
      flex: 1;
      overflow-y: auto;
      padding: .75rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .compliance-alerts::-webkit-scrollbar { width: 5px; }
    .compliance-alerts::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }

    .compliance-placeholder {
      color: var(--muted);
      font-style: italic;
      font-size: .8rem;
      text-align: center;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .compliance-placeholder .shield {
      font-size: 2rem;
      opacity: .4;
    }

    /* ── Alert card ─────────────────────────────────────── */
    .alert-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem;
      animation: alertIn .3s ease;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .alert-card.severity-high {
      border-color: #ef444460;
      background: #ef444410;
    }
    .alert-card.severity-medium {
      border-color: #f59e0b60;
      background: #f59e0b10;
    }
    .alert-card.severity-low {
      border-color: #6366f160;
      background: #6366f110;
    }
    .alert-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .4rem;
    }
    .alert-severity {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      padding: .15rem .5rem;
      border-radius: 4px;
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .alert-severity.high   { background: #ef444430; color: var(--red); }
    .alert-severity.medium { background: #f59e0b30; color: var(--amber); }
    .alert-severity.low    { background: #6366f130; color: var(--accent); }
    .alert-time {
      font-size: .62rem;
      color: var(--muted);
      font-family: monospace;
    }
    .alert-title {
      font-size: .8rem;
      font-weight: 600;
      margin-bottom: .25rem;
    }
    .alert-description {
      font-size: .75rem;
      color: var(--muted);
      line-height: 1.45;
    }

    /* ── Chat container (right) ─────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    .chat-header {
      padding: .75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .chat-header h2 { font-size: .85rem; font-weight: 600; }
    .chat-header .icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      background: #6366f120; color: #6366f1;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      background:
        radial-gradient(circle at 20% 50%, #1a1d2718 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #6366f108 0%, transparent 40%),
        var(--bg);
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }

    /* ── Chat bubbles ───────────────────────────────────── */
    .bubble {
      max-width: 75%;
      padding: .65rem .9rem .45rem;
      border-radius: 12px;
      font-size: .88rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      animation: bubbleIn .2s ease;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bubble-left {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble-right {
      align-self: flex-end;
      background: #0d2818;
      border: 1px solid #22c55e30;
      border-bottom-right-radius: 4px;
    }
    .bubble-agent {
      align-self: flex-end;
      background: #1a1040;
      border: 1px solid #6366f130;
      border-bottom-right-radius: 4px;
    }
    .bubble-meta {
      display: flex;
      align-items: center;
      gap: .4rem;
      margin-bottom: .2rem;
    }
    .bubble-role {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .bubble-left .bubble-role  { color: #3b82f6; }
    .bubble-right .bubble-role { color: #22c55e; }
    .bubble-agent .bubble-role { color: #a78bfa; }
    .bubble-time {
      font-size: .62rem;
      color: var(--muted);
    }
    .bubble-text {
      font-size: .88rem;
      line-height: 1.55;
    }
    .bubble.interim {
      opacity: .65;
      border-style: dashed;
    }
    .bubble-latency {
      display: inline-block;
      margin-top: .3rem;
      padding: .15rem .45rem;
      border-radius: 6px;
      font-size: .62rem;
      font-weight: 600;
      font-family: monospace;
      background: #6366f120;
      color: #6366f1;
    }

    /* ── Typing indicator bar ────────────────────────────── */
    .typing-bar {
      padding: .5rem 1.25rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: var(--muted);
    }
    .typing-bar.active { display: flex; }
    .typing-dots { display: flex; gap: 3px; }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .placeholder {
      color: var(--muted);
      font-style: italic;
      font-size: .85rem;
      text-align: center;
      padding: 2rem;
    }

    /* ── Debug log ──────────────────────────────────────── */
    .debug-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .5rem 1.25rem;
      font-size: .7rem;
      color: var(--muted);
      height: 60px;
      overflow-y: auto;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <h1>📞 Agent Assist Dashboard</h1>
        <span class="subtitle">Real-time STT → RAG → Gemini + Compliance Monitoring</span>
      </div>
    </div>
    <div class="header-right">
      <button class="settings-toggle" id="settingsToggle">⚙️ Settings</button>
      <span class="status-badge disconnected" id="statusBadge">
        <span class="dot"></span>
        <span id="statusText">Disconnected</span>
      </span>
    </div>
  </div>

  <!-- Settings drawer (collapsible) -->
  <div class="settings-drawer" id="settingsDrawer">
    <div class="field">
      <label for="sttModel">STT:</label>
      <select id="sttModel" disabled>
        <option value="chirp_3" selected>chirp_3</option>
      </select>
    </div>
    <div class="field">
      <label for="sttLang">Language:</label>
      <select id="sttLang">
        <option value="auto" selected>Auto-detect</option>
        <option value="hi-IN,en-IN">Hindi + English</option>
        <option value="en-US">English (US)</option>
        <option value="en-IN">English (India)</option>
        <option value="hi-IN">Hindi</option>
        <option value="mr-IN">Marathi</option>
        <option value="ta-IN">Tamil</option>
        <option value="te-IN">Telugu</option>
        <option value="kn-IN">Kannada</option>
        <option value="gu-IN">Gujarati</option>
        <option value="bn-IN">Bengali</option>
        <option value="ml-IN">Malayalam</option>
      </select>
    </div>
    <div class="field">
      <label for="llmModel">LLM:</label>
      <select id="llmModel" disabled>
        <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
      </select>
    </div>
    <button class="btn btn-primary" id="connectBtn">Connect & Start</button>
    <button class="btn btn-danger" id="disconnectBtn" disabled>Disconnect</button>
  </div>

  <div class="main">
    <!-- Compliance Panel (left) -->
    <div class="compliance-panel">
      <div class="compliance-header">
        <div class="compliance-header-left">
          <span class="icon">🛡️</span>
          <h2>Compliance Alerts</h2>
        </div>
        <span class="alert-counter" id="alertCounter">0</span>
      </div>
      <div class="compliance-alerts" id="complianceAlerts">
        <div class="compliance-placeholder" id="compliancePlaceholder">
          <span class="shield">🛡️</span>
          <span>Monitoring active. Compliance alerts will appear here when violations are detected.</span>
        </div>
      </div>
    </div>

    <!-- Content – WhatsApp-style unified chat (right) -->
    <div class="content">
      <div class="chat-header">
        <span class="icon">💬</span>
        <h2>Live Conversation</h2>
      </div>
      <div class="chat-messages" id="chatMessages">
        <p class="placeholder">Start a call to see the conversation…</p>
      </div>
      <div class="typing-bar" id="typingBar">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span>Speaking…</span>
      </div>
    </div>
  </div>

  <!-- Debug log -->
  <div class="debug-bar" id="debugLog">Ready.</div>

<script type="module">
// ────────────────────────────────────────────────────────────────────────── //
//  AudioWorklet + WebSocket — Chat UI + Compliance Monitoring                //
// ────────────────────────────────────────────────────────────────────────── //

const sttModelSel      = document.getElementById("sttModel");
const sttLangSel       = document.getElementById("sttLang");
const llmModelSel      = document.getElementById("llmModel");
const connectBtn       = document.getElementById("connectBtn");
const disconnectBtn    = document.getElementById("disconnectBtn");
const statusBadge      = document.getElementById("statusBadge");
const statusText       = document.getElementById("statusText");
const chatMessages     = document.getElementById("chatMessages");
const typingBar        = document.getElementById("typingBar");
const debugLog         = document.getElementById("debugLog");
const settingsToggle   = document.getElementById("settingsToggle");
const settingsDrawer   = document.getElementById("settingsDrawer");
const complianceAlerts = document.getElementById("complianceAlerts");
const compliancePlaceholder = document.getElementById("compliancePlaceholder");
const alertCounter     = document.getElementById("alertCounter");

let ws = null;
let audioContext = null;
let mediaStream = null;
let workletNode = null;
let interimBubble = null;
let assistantStreamBubble = null;
let queryStartTime = null;
let firstChunkReceived = false;
let alertCount = 0;

// Map segment index → bubble element (for speaker role updates)
const segmentBubbles = new Map();

// ── Settings drawer toggle ────────────────────────────────────────────── //
settingsToggle.addEventListener("click", () => {
  settingsDrawer.classList.toggle("open");
});

// ── Helpers ───────────────────────────────────────────────────────────── //
function log(msg) {
  const ts = new Date().toLocaleTimeString();
  debugLog.textContent = `[${ts}] ${msg}\n` + debugLog.textContent;
}

function setStatus(s) {
  statusText.textContent = s;
  statusBadge.className = "status-badge";
  if (s === "Connected")       statusBadge.classList.add("connected");
  else if (s === "Connecting") statusBadge.classList.add("connecting");
  else                         statusBadge.classList.add("disconnected");
}

function timeNow() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function clearPlaceholder() {
  const ph = chatMessages.querySelector(".placeholder");
  if (ph) ph.remove();
}

function scrollChat() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

/** Create a chat bubble. role: "user" | "assistant" | "agent" | "customer" */
function makeBubble(role, text, interim = false) {
  let side, label, cssClass;
  switch (role) {
    case "agent":
      side = "agent"; label = "🧑‍💼 Agent"; cssClass = "bubble-agent"; break;
    case "customer":
      side = "left"; label = "🎤 Customer"; cssClass = "bubble-left"; break;
    case "assistant":
      side = "right"; label = "🤖 AI Assistant"; cssClass = "bubble-right"; break;
    default: // "user" – before speaker identification
      side = "left"; label = "🎙️ Speaker"; cssClass = "bubble-left"; break;
  }

  const div = document.createElement("div");
  div.className = `bubble ${cssClass}` + (interim ? " interim" : "");
  div.innerHTML =
    `<div class="bubble-meta">` +
    `<span class="bubble-role">${label}</span>` +
    `<span class="bubble-time">${timeNow()}</span>` +
    `</div><div class="bubble-text"></div>`;
  div.querySelector(".bubble-text").textContent = text;
  return div;
}

/** Update a bubble's speaker role after identification. */
function updateBubbleRole(bubble, role) {
  if (!bubble) return;
  let label, cssClass;
  switch (role) {
    case "agent":
      label = "🧑‍💼 Agent"; cssClass = "bubble-agent"; break;
    case "customer":
      label = "🎤 Customer"; cssClass = "bubble-left"; break;
    default: return;
  }
  // Update CSS class
  bubble.classList.remove("bubble-left", "bubble-right", "bubble-agent");
  bubble.classList.add(cssClass);
  // Update role label
  const roleEl = bubble.querySelector(".bubble-role");
  if (roleEl) roleEl.textContent = label;
}

/** Add a compliance alert to the panel. */
function addComplianceAlert(alert) {
  if (compliancePlaceholder) compliancePlaceholder.remove();

  alertCount++;
  alertCounter.textContent = alertCount;
  alertCounter.classList.add("has-alerts");

  const card = document.createElement("div");
  card.className = `alert-card severity-${alert.severity || "low"}`;

  const severityIcon = alert.severity === "high" ? "🔴" :
                       alert.severity === "medium" ? "🟡" : "🔵";

  card.innerHTML =
    `<div class="alert-card-header">` +
    `<span class="alert-severity ${alert.severity || "low"}">${severityIcon} ${(alert.severity || "low").toUpperCase()}</span>` +
    `<span class="alert-time">${alert.timestamp || timeNow()}</span>` +
    `</div>` +
    `<div class="alert-title">${escapeHtml(alert.title || "Compliance Alert")}</div>` +
    `<div class="alert-description">${escapeHtml(alert.description || "")}</div>`;

  complianceAlerts.prepend(card);
  log(`⚠️ Compliance alert [${alert.severity}]: ${alert.title}`);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ── Connect ───────────────────────────────────────────────────────────── //
connectBtn.addEventListener("click", async () => {
  setStatus("Connecting");
  connectBtn.disabled = true;
  log("Connecting…");
  chatMessages.innerHTML = '<p class="placeholder">Listening…</p>';

  // Reset compliance state
  alertCount = 0;
  alertCounter.textContent = "0";
  alertCounter.classList.remove("has-alerts");
  complianceAlerts.innerHTML =
    '<div class="compliance-placeholder" id="compliancePlaceholder">' +
    '<span class="shield">🛡️</span>' +
    '<span>Monitoring active. Compliance alerts will appear here when violations are detected.</span>' +
    '</div>';
  segmentBubbles.clear();

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: { ideal: 16000 },
               echoCancellation: true, noiseSuppression: true }
    });

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${proto}//${location.host}/ws`
      + `?stt_model=${sttModelSel.value}`
      + `&stt_language=${encodeURIComponent(sttLangSel.value)}`
      + `&llm_model=${llmModelSel.value}`;

    log(`WS → ${wsUrl}`);
    ws = new WebSocket(wsUrl);
    ws.binaryType = "arraybuffer";

    ws.onopen = async () => {
      setStatus("Connected");
      disconnectBtn.disabled = false;
      log("WebSocket connected");

      audioContext = new AudioContext();
      log(`Sample rate: ${audioContext.sampleRate} Hz`);
      const source = audioContext.createMediaStreamSource(mediaStream);

      // ── AudioWorklet – runs on dedicated audio thread ────────── //
      await audioContext.audioWorklet.addModule("/static/audio-processor.js");
      workletNode = new AudioWorkletNode(audioContext, "pcm-processor");
      workletNode.port.onmessage = (e) => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
      };
      source.connect(workletNode);
      workletNode.connect(audioContext.destination);
      log("AudioWorklet streaming started");
    };

    // ── Incoming messages ────────────────────────────────────────── //
    ws.onmessage = (event) => {
      if (typeof event.data !== "string") return;
      try {
        const msg = JSON.parse(event.data);

        // ── Transcription (both speakers) ────────────────────── //
        if (msg.type === "transcription" || msg.type === "transcript") {
          const text = msg.text || msg.content || "";

          if (msg.role === "user") {
            clearPlaceholder();
            if (msg.is_final === false) {
              typingBar.classList.add("active");
              if (!interimBubble) {
                interimBubble = makeBubble("user", text, true);
                chatMessages.appendChild(interimBubble);
              } else {
                interimBubble.querySelector(".bubble-text").textContent = text;
              }
            } else {
              typingBar.classList.remove("active");
              // Start latency timer on final transcript
              queryStartTime = performance.now();
              firstChunkReceived = false;

              let bubble;
              if (interimBubble) {
                interimBubble.classList.remove("interim");
                interimBubble.querySelector(".bubble-text").textContent = text;
                interimBubble.querySelector(".bubble-time").textContent = timeNow();
                bubble = interimBubble;
                interimBubble = null;
              } else {
                bubble = makeBubble("user", text);
                chatMessages.appendChild(bubble);
              }

              // Track segment index for speaker role updates
              if (msg.segment_index !== undefined) {
                segmentBubbles.set(String(msg.segment_index), bubble);
              }
            }
            scrollChat();
          }
        }

        // ── Speaker identification updates ──────────────────── //
        if (msg.type === "speaker_update" && msg.roles) {
          for (const [idx, role] of Object.entries(msg.roles)) {
            const bubble = segmentBubbles.get(idx);
            if (bubble) updateBubbleRole(bubble, role);
          }
          log(`Speaker roles updated: ${Object.keys(msg.roles).length} segments identified`);
        }

        // ── Compliance alerts ────────────────────────────────── //
        if (msg.type === "compliance_alert" && msg.alert) {
          addComplianceAlert(msg.alert);
        }

        // ── Streaming AI assistant ──────────────────────────── //
        if (msg.type === "stream_start" && msg.role === "assistant") {
          clearPlaceholder();
          assistantStreamBubble = makeBubble("assistant", "", true);
          chatMessages.appendChild(assistantStreamBubble);
          scrollChat();
        }

        if (msg.type === "stream_chunk" && msg.role === "assistant") {
          if (assistantStreamBubble) {
            if (!firstChunkReceived && queryStartTime) {
              firstChunkReceived = true;
              const ttfc = ((performance.now() - queryStartTime) / 1000).toFixed(2);
              log(`⚡ TTFC: ${ttfc}s`);
            }
            const el = assistantStreamBubble.querySelector(".bubble-text");
            el.textContent += msg.text || "";
            scrollChat();
          }
        }

        if (msg.type === "stream_end" && msg.role === "assistant") {
          if (assistantStreamBubble) {
            assistantStreamBubble.classList.remove("interim");
            if (queryStartTime) {
              const totalSec = ((performance.now() - queryStartTime) / 1000).toFixed(2);
              const badge = document.createElement("div");
              badge.className = "bubble-latency";
              badge.textContent = `⏱ ${totalSec}s total`;
              assistantStreamBubble.appendChild(badge);
              log(`⏱ Response complete: ${totalSec}s total`);
              queryStartTime = null;
            }
            assistantStreamBubble.querySelector(".bubble-time").textContent = timeNow();
            assistantStreamBubble = null;
          }
        }

        if (msg.type === "error") log(`Error: ${msg.text}`);
      } catch { /* ignore non-JSON */ }
    };

    ws.onclose = () => {
      setStatus("Disconnected");
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
      typingBar.classList.remove("active");
      log("WebSocket closed");
      cleanup();
    };

    ws.onerror = () => {
      log("WebSocket error");
      setStatus("Disconnected");
      connectBtn.disabled = false;
      cleanup();
    };
  } catch (err) {
    log(`Error: ${err.message}`);
    setStatus("Disconnected");
    connectBtn.disabled = false;
    cleanup();
  }
});

function cleanup() {
  if (workletNode)  { workletNode.disconnect(); workletNode = null; }
  if (audioContext)  { audioContext.close();     audioContext = null; }
  if (mediaStream)   { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  interimBubble = null;
  assistantStreamBubble = null;
}

disconnectBtn.addEventListener("click", () => {
  if (ws) { ws.close(); ws = null; }
  cleanup();
  setStatus("Disconnected");
  connectBtn.disabled = false;
  disconnectBtn.disabled = true;
  typingBar.classList.remove("active");
  log("Disconnected");
});
</script>
</body>
</html>
